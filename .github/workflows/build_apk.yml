name: Flutter Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Re-create Missing Android Files
      run: |
        flutter create . --platforms=android
        
        # সব সাব-প্লাগইন ও প্যাকেজের compileSdk এবং targetSdk সংস্করণ ৩৬ করার জন্য স্ক্রিপ্ট
        cat << 'EOF' >> android/build.gradle.kts
        subprojects {
            afterEvaluate {
                if (hasProperty("android")) {
                    extensions.configure<com.android.build.gradle.BaseExtension> {
                        compileSdkVersion(36)
                        defaultConfig {
                            targetSdkVersion(36)
                        }
                    }
                }
            }
        }
        EOF

    - name: Install Dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --split-per-abi --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
